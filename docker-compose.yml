version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-your_strong_secret_here}
      - OMDB_API_KEY=${OMDB_API_KEY:-trilogy}
    volumes:
      - ./backend/data:/app/data
    networks:
      - streamflix-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - streamflix-network
    restart: unless-stopped

networks:
  streamflix-network:
    driver: bridge

volumes:
  backend-data:
